<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Snake</title>

<style>

*{
margin:0;
box-sizing:border-box;
font-family:Arial;
}

body{

background:
linear-gradient(
180deg,
#0f172a,
#111827
);

height:100vh;

display:flex;

justify-content:center;

align-items:center;

color:white;

}

.game{

text-align:center;

}

h1{
margin-bottom:10px;
}

#menu{

margin-bottom:15px;

}

button{

padding:10px 18px;

margin:4px;

border:none;

border-radius:10px;

background:#1e293b;

color:white;

cursor:pointer;

}

button:hover{
transform:scale(1.05);
}

canvas{

background:#07111f;

border:4px solid #4ade80;

border-radius:12px;

}

#score{

margin-top:12px;

font-size:22px;

}

#high{

margin-top:8px;

opacity:.8;

}

#msg{

height:30px;

margin-top:10px;

}

</style>
</head>

<body>

<div class="game">

<h1>🐍 Mini Snake</h1>

<div id="menu">

<button onclick="start(220)">
🐢 Slow
</button>

<button onclick="start(140)">
🚶 Medium
</button>

<button onclick="start(80)">
⚡ Fast
</button>

</div>

<canvas
id="c"
width="420"
height="420">
</canvas>

<div id="score">
0
</div>

<div id="high"></div>

<div id="msg">
Pick speed
</div>

</div>

<script>

const c=
document.getElementById("c")

const ctx=
c.getContext("2d")

const scoreUI=
document.getElementById("score")

const highUI=
document.getElementById("high")

const msg=
document.getElementById("msg")

const size=20

let snake

let food

let dx

let dy

let score

let loop

let mode

function getHigh(){

return Number(
localStorage[
"snake"+mode
]
)||0

}

function setHigh(v){

localStorage[
"snake"+mode
]=v

}

function reset(){

snake=[
{x:10,y:10}
]

food=random()

dx=1

dy=0

score=0

}

function random(){

return{

x:
Math.floor(
Math.random()*21
),

y:
Math.floor(
Math.random()*21
)

}

}

function draw(){

ctx.clearRect(
0,
0,
420,
420
)

ctx.fillStyle=
"#ef4444"

ctx.fillRect(
food.x*size,
food.y*size,
size,
size
)

snake.forEach(
(s,i)=>{

ctx.fillStyle=
i
?
"#22c55e"
:
"#4ade80"

ctx.fillRect(

s.x*size,

s.y*size,

size-2,

size-2

)

}

)

}

function step(){

let head={

x:
snake[0].x+dx,

y:
snake[0].y+dy

}

if(

head.x<0||

head.y<0||

head.x>20||

head.y>20||

snake.some(
s=>
s.x===head.x&&
s.y===head.y
)

){

clearInterval(
loop
)

let high=
getHigh()

if(
score>high
){

setHigh(
score
)

}

msg.textContent=
"💀 Press R"

show()

return

}

snake.unshift(
head
)

if(

head.x===
food.x&&

head.y===
food.y

){

score++

food=
random()

}
else{

snake.pop()

}

show()

draw()

}

function show(){

scoreUI.textContent=
"Score "+score

highUI.textContent=
"High "+getHigh()

}

function start(speed){

clearInterval(
loop
)

mode=speed

reset()

show()

draw()

msg.textContent=
"Arrows • R"

loop=
setInterval(
step,
speed
)

}

document.addEventListener(
"keydown",
e=>{

if(
e.key==="ArrowUp"
&&dy!==1
){

dx=0
dy=-1

}

if(
e.key==="ArrowDown"
&&dy!==-1
){

dx=0
dy=1

}

if(
e.key==="ArrowLeft"
&&dx!==1
){

dx=-1
dy=0

}

if(
e.key==="ArrowRight"
&&dx!==-1
){

dx=1
dy=0

}

if(
e.key
.toLowerCase()
==="r"
&&mode
){

start(
mode
)

}

})

draw()

</script>

</body>
</html>
